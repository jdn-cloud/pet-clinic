trigger:
- main

variables:
- name: azureServiceConnection
  value: azurerm-terraform-backend
- name: resourceGroup
  value: rg-tfstate
- name: storageAccount
  value: tfstate7a4c4iw4gbetk
- name: container
  value: terraform-state
- name: tfStateKey
  value: petclinic.tfstate
- group: terraform-prod-vars

stages:
# =========================
# STAGE 1: TERRAFORM PLAN
# =========================
- stage: Plan
  displayName: Terraform Plan
  jobs:
  - job: PlanJob
    displayName: Terraform Plan Job
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: TerraformInstaller@0
      displayName: Install Terraform
      inputs:
        terraformVersion: latest

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        backendServiceArm: $(azureServiceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(container)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        commandOptions: -out=main.tfplan -var="admin_password=$(TF_VAR_admin_password)"
        environmentServiceNameAzureRM: $(azureServiceConnection)

    - task: PublishPipelineArtifact@1
      displayName: Publish Terraform Plan
      inputs:
        targetPath: $(System.DefaultWorkingDirectory)
        artifact: terraform-plan
        publishLocation: pipeline

# =========================
# STAGE 2: TERRAFORM APPLY
# =========================
- stage: Deploy
  displayName: Terraform Apply
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: Deploy to Production
    environment: production
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: none

          - task: DownloadPipelineArtifact@2
            displayName: Download Terraform Plan
            inputs:
              buildType: current
              artifactName: terraform-plan
              targetPath: $(System.DefaultWorkingDirectory)

          - task: Bash@3
            displayName: Fix Provider Permissions
            inputs:
              targetType: inline
              script: |
                chmod -R +x .terraform/providers/ 2>/dev/null || true

          - task: TerraformInstaller@0
            displayName: Install Terraform
            inputs:
              terraformVersion: latest

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: $(resourceGroup)
              backendAzureRmStorageAccountName: $(storageAccount)
              backendAzureRmContainerName: $(container)
              backendAzureRmKey: $(tfStateKey)

          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: azurerm
              command: apply
              commandOptions: main.tfplan
              environmentServiceNameAzureRM: $(azureServiceConnection)